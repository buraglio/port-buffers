# Packet Buffer Reference Data
# Source: Jim Warner, UCSC (archived 2014)
# Information here is by rumor, innuendo and extrapolation.
# Manufacturers rarely publish packet buffer info in data sheets.
#
# Fields:
#   model         – switch model name
#   vendor        – manufacturer
#   section       – table grouping (determines display order)
#   port_type     – physical port configuration
#   rx_queue      – RX queue count / scheme
#   tx_queue      – TX queue count / scheme (blank if not documented)
#   total_buffer  – total packet buffer
#   rx_buffer     – RX buffer (blank if not documented or shared)
#   tx_buffer     – TX buffer, or max a single port can claim
#   notes         – any caveats or extra context
#   detail_page   – slug for /switches/<slug>/ detail page (omit if none)

